<!DOCTYPE html>
<html lang="en">

<head>
    <title>HurtTree Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/HTLOGO.png">

    <!-- MODEL VIEWER -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
</head>

<body>
    <div class="sidebar">
        <div class="side-item">
            <p>Christian Connolly</p>
            <p>HurtTree</p>
        </div>
        <a href="index.html">
            <div class="side-item" id="about-button">
                <p>About</p>
            </div>
        </a>
        <a href="GameJams.html">
            <div class="side-item" id="game-jams-button">
                <p>Game Jams</p>
            </div>
        </a>
        <div class="side-item" id="low-poly-button">
            <p>🠊 Low Poly 🠈</p>
        </div>
        <a href="Stylized.html">
            <div class="side-item" id="stylized-button">
                <p>Stylized</p>
            </div>
        </a>
        <a href="HighPoly.html">
            <div class="side-item" id="high-poly-button">
                <p>High Poly</p>
            </div>
        </a>
        <a href="Contact.html">
            <div class="side-item" id="contact-button">
                <p>Contact</p>
            </div>
        </a>
    </div>
    <div class="main">
        <p class="c">I am most comfortable with low poly assets and I love the retro aesthetic.</p>
        <p class="c">You can click and drag to pan around the models.</p>
        <p class="c">WIP Come back soon!</p>
        <br>
        <div class="grid-container">
            <div class="model-panel">
                <model-viewer class="model" alt="A really neat looking bike" src="models/Bike.glb"
                    poster="images/bikeposter.webp" exposure="0.8" disable-zoom auto-rotate interaction-prompt="none"
                    shadow-intensity="1" camera-controls touch-action="pan-y">
                </model-viewer>
            </div>
            <div class="model-panel">
                <model-viewer class="model" alt="A blue car on the street" src="models/Street.glb"
                    poster="images/streetposter.webp" auto-rotate exposure="0.35" camera-orbit="40deg 74.33deg 116.4m"
                    field-of-view="30deg" disable-zoom interaction-prompt="none" shadow-intensity="1" camera-controls
                    touch-action="pan-y" min-camera-orbit="auto 0deg auto" max-camera-orbit="auto 85deg auto">
                </model-viewer>
            </div>
            <div class="model-panel">
                <model-viewer class="model" alt="A scary cultist in red robes with a mask" src="models/Cultist.glb"
                    poster="images/cultistposter.webp" autoplay exposure="0.4" disable-zoom auto-rotate
                    interaction-prompt="none" shadow-intensity="1" camera-controls touch-action="pan-y">
                </model-viewer>
            </div>
            <div class="model-panel">
                <model-viewer class="model" alt="An alley strewn with litter" src="models/Psx.glb"
                    poster="images/psxposter.webp" exposure="0.35" camera-orbit="60.95deg 77.72deg 46.89m"
                    field-of-view="22.98deg" disable-zoom shadow-intensity="1" camera-controls touch-action="pan-y"
                    min-camera-orbit="0deg 0deg auto" interaction-prompt="none" max-camera-orbit="80deg 90deg auto">
                </model-viewer>
            </div>


        </div>
    </div>
</body>
